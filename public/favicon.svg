<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background: Off-white Mint -->
  <rect width="512" height="512" rx="112" fill="#F7FFF7"/>
  
  <!-- Thick Border in Deep Navy -->
  <rect x="20" y="20" width="472" height="472" rx="92" fill="none" stroke="#2F3061" stroke-width="24"/>
  
  <!-- Playful circles/bubbles in theme colors -->
  <circle cx="180" cy="180" r="95" fill="#FF5E5E" stroke="#2F3061" stroke-width="12"/> <!-- Fun Coral with Navy Outline -->
  <circle cx="332" cy="332" r="95" fill="#4ECDC4" stroke="#2F3061" stroke-width="12"/> <!-- Soft Teal with Navy Outline -->
  
  <!-- Smiling yellow star in center -->
  <path d="M 256 120 L 290 200 L 376 200 L 306 250 L 332 332 L 256 280 L 180 332 L 206 250 L 136 200 L 222 200 Z" fill="#FFE66D" stroke="#2F3061" stroke-width="12" stroke-linejoin="round"/> <!-- Sunny Yellow with Navy Outline -->
  
  <!-- Eyes -->
  <circle cx="232" cy="225" r="10" fill="#2F3061"/>
  <circle cx="280" cy="225" r="10" fill="#2F3061"/>
  
  <!-- Smiling Mouth -->
  <path d="M 238 255 Q 256 272 274 255" stroke="#2F3061" stroke-width="10" stroke-linecap="round" fill="none"/>
</svg>
