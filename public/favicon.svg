<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Parchment background circle -->
  <circle cx="32" cy="32" r="30" fill="#F4ECD8" stroke="#2B2D5E" stroke-width="3"/>
  <!-- Horizontal "primary cord" -->
  <line x1="10" y1="32" x2="54" y2="32" stroke="#D4B896" stroke-width="4" stroke-linecap="round"/>
  <!-- Left hanging string -->
  <line x1="20" y1="32" x2="20" y2="48" stroke="#D4B896" stroke-width="3" stroke-linecap="round"/>
  <!-- Center hanging string (longer) -->
  <line x1="32" y1="32" x2="32" y2="52" stroke="#D4B896" stroke-width="3" stroke-linecap="round"/>
  <!-- Right hanging string -->
  <line x1="44" y1="32" x2="44" y2="44" stroke="#D4B896" stroke-width="3" stroke-linecap="round"/>
  <!-- Knot on left string — cochineal red circle -->
  <circle cx="20" cy="41" r="4" fill="#C0392B" stroke="#2B2D5E" stroke-width="1.5"/>
  <!-- Knot on center string — larger, indigo -->
  <circle cx="32" cy="43" r="5" fill="#C0392B" stroke="#2B2D5E" stroke-width="1.5"/>
  <!-- Knot on right string — sienna -->
  <circle cx="44" cy="38" r="3.5" fill="#A0522D" stroke="#2B2D5E" stroke-width="1.5"/>
  <!-- Top-left short string -->
  <line x1="26" y1="16" x2="26" y2="32" stroke="#D4B896" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Knot on top-left string -->
  <circle cx="26" cy="22" r="3" fill="#2B2D5E" stroke="#2B2D5E" stroke-width="1"/>
</svg>
