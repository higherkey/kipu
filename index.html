<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Kipu</title>
  </head>
  <body>
    <div id="app">
      <!-- Navigation Shell -->
      <nav id="navigation-shell" class="hidden" aria-label="Main Menu">
        <h1>Kipu</h1>
        <div id="game-list" role="menu">
          <a href="/game/bubbleWrap" data-game="bubbleWrap" role="menuitem">
            <span class="icon"></span>
            <span class="game-label">
              <span class="game-title">Poka</span>
              <span class="game-subtitle">Bubble Wrap</span>
            </span>
          </a>
          <a href="/game/noButton" data-game="noButton" role="menuitem">
            <span class="icon"></span>
            <span class="game-label">
              <span class="game-title">Eeno</span>
              <span class="game-subtitle">The "No" Button</span>
            </span>
          </a>
          <a href="/game/balloonPop" data-game="balloonPop" role="menuitem">
            <span class="icon"></span>
            <span class="game-label">
              <span class="game-title">Tapa</span>
              <span class="game-subtitle">Balloon Pop</span>
            </span>
          </a>
          <a href="/game/colorMixer" data-game="colorMixer" role="menuitem">
            <span class="icon"></span>
            <span class="game-label">
              <span class="game-title">Maka</span>
              <span class="game-subtitle">Color Mixer</span>
            </span>
          </a>
          <a href="/game/soundBoard" data-game="soundBoard" role="menuitem">
            <span class="icon"></span>
            <span class="game-label">
              <span class="game-title">Sound Board</span>
              <span class="game-subtitle">Audio Patterns</span>
            </span>
          </a>
          <a href="/game/particlePhysics" data-game="particlePhysics" role="menuitem">
            <span class="icon"></span>
            <span class="game-label">
              <span class="game-title">Particle Play</span>
              <span class="game-subtitle">Physics Sandbox</span>
            </span>
          </a>
        </div>
      </nav>

      <!-- Game Container (Canvas) -->
      <canvas id="game-canvas" class="hidden" aria-label="Game Canvas"></canvas>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
