<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Kids Games Suite</title>
  </head>
  <body>
    <div id="app">
      <!-- Navigation Shell -->
      <nav id="navigation-shell" class="hidden" aria-label="Main Menu">
        <h1>Kids Games Suite</h1>
        <div id="game-list" role="menu">
          <button data-game="bubbleWrap" role="menuitem">
            <span class="icon"></span>
            <span>Bubble Wrap</span>
          </button>
          <button data-game="noButton" role="menuitem">
            <span class="icon"></span>
            <span>The "No" Button</span>
          </button>
          <button data-game="balloonPop" role="menuitem">
            <span class="icon"></span>
            <span>Balloon Pop</span>
          </button>
          <button data-game="soundBoard" role="menuitem">
            <span class="icon"></span>
            <span>Sound Board</span>
          </button>
          <button data-game="particlePhysics" role="menuitem">
            <span class="icon"></span>
            <span>Particle Play</span>
          </button>
        </div>
      </nav>

      <!-- Game Container (Canvas) -->
      <canvas id="game-canvas" class="hidden" aria-label="Game Canvas"></canvas>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
